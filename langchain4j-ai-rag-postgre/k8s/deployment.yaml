apiVersion: apps/v1
kind: Deployment
metadata:
  name: langchain4j-ai-rag-postgre
  labels:
    app.kubernetes.io/name: langchain4j-ai-rag-postgre
    app.kubernetes.io/part-of: egovframe-ai-rag
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: langchain4j-ai-rag-postgre
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langchain4j-ai-rag-postgre
        app.kubernetes.io/part-of: egovframe-ai-rag
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: app
          # Replace with your registry/tag, e.g. ghcr.io/<org>/langchain4j-ai-rag-postgre:1.0.0
          image: langchain4j-ai-rag-postgre:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: langchain4j-ai-rag-postgre
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: langchain4j-ai-rag-postgre-db
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langchain4j-ai-rag-postgre-db
                  key: password
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
