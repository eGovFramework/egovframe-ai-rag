apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-ai-rag-redis
  labels:
    app.kubernetes.io/name: spring-ai-rag-redis
    app.kubernetes.io/part-of: egovframe-ai-rag
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: spring-ai-rag-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spring-ai-rag-redis
        app.kubernetes.io/part-of: egovframe-ai-rag
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: app
          # Replace with your registry/tag, e.g. ghcr.io/<org>/spring-ai-rag-redis:1.0.0
          image: spring-ai-rag-redis:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: spring-ai-rag-redis
          env:
            # DJL이 네이티브 라이브러리를 user.home/.djl.ai/에 캐시하므로 쓰기 가능한 /tmp로 지정한다.
            # EMBEDDING_MODEL_PATH/EMBEDDING_TOKENIZER_PATH와 분리해 readOnlyRootFilesystem 환경에서도 동작하게 한다.
            - name: JAVA_TOOL_OPTIONS
              value: "-Duser.home=/tmp"
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              # 모델 외부화는 이미지 크기만 줄이고 런타임 메모리 요구량은 거의 동일하다.
              # TransformersEmbeddingModel 이 OrtSession.create(byte[]) 로 모델 파일 전체를
              # JVM 힙에 byte[] 로 올린 뒤 ONNX Runtime 에 전달하므로, 로딩 중 JVM 힙(~1.2GB)과
              # ONNX 네이티브(~1.2GB)가 동시에 필요하고 여기에 JVM 논힙·DJL 버퍼까지 더해진다.
              # 4Gi 에서는 기동 중 OOMKill 이 발생하므로 8Gi 로 설정한다.
              memory: "8Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # ONNX 임베딩 모델(model.onnx, tokenizer.json)을 PVC에서 마운트
            # PVC에 사전 적재 필요: kubectl cp <로컬-모델-디렉토리> <pod>:/models/
            - name: models
              mountPath: /models
              readOnly: true
            - name: documents
              mountPath: /workspace/data
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: models
          persistentVolumeClaim:
            claimName: spring-ai-rag-redis-models
        - name: documents
          emptyDir: {}  # 운영 시 PersistentVolumeClaim으로 교체
