apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-ai-rag-redis
  labels:
    app.kubernetes.io/name: spring-ai-rag-redis
    app.kubernetes.io/part-of: egovframe-ai-rag
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: spring-ai-rag-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spring-ai-rag-redis
        app.kubernetes.io/part-of: egovframe-ai-rag
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: app
          # Replace with your registry/tag, e.g. ghcr.io/<org>/spring-ai-rag-redis:1.0.0
          image: spring-ai-rag-redis:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: spring-ai-rag-redis
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: documents
              mountPath: /workspace/data
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: documents
          emptyDir: {}  # Replace with a PersistentVolumeClaim for real document storage.
